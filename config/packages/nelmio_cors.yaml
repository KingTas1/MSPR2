nelmio_cors:
  defaults:
    allow_origin: ['http://localhost:5173', 'http://127.0.0.1:5173', 'http://localhost:3000']
    allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
    allow_headers: ['Content-Type', 'Authorization', 'Accept']
    expose_headers: ['Link']
    max_age: 3600
    allow_credentials: true
  paths:
    '^/api/':
      allow_origin: ['http://localhost:5173', 'http://127.0.0.1:5173', 'http://localhost:3000']
      allow_methods: ['GET', 'POST', 'PUT', 'PATCH', 'DELETE', 'OPTIONS']
      allow_headers: ['Content-Type', 'Authorization', 'Accept']
      max_age: 3600

